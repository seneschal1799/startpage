<style>
body {
    margin: 0;
    padding: 120px 12px 12px 12px;
    font-family: sans-serif;
    background: #111;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
}

.tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    border-radius: 12px;
    background: #222;
    color: white;
    text-decoration: none;
    font-size: 16px;
    gap: 8px;
    text-align: center;
}

.tile img {
    width: 32px;
    height: 32px;
}
    
</style>
